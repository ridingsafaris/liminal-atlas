<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — Liminal Atlas</title>
  <meta name="description" content="Search all Liminal Atlas close readings.">
  <link rel="stylesheet" href="/css/style.css">
  <link href="/_pagefind/pagefind-ui.css" rel="stylesheet">
  <style>
    .search-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 100px;
    }
    .search-heading {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 28px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    /* Pagefind UI overrides to match site theme */
    .pagefind-ui {
      --pagefind-ui-scale: 0.9;
      --pagefind-ui-primary: var(--blue-bright);
      --pagefind-ui-text: var(--text);
      --pagefind-ui-background: var(--surface2);
      --pagefind-ui-border: var(--border2);
      --pagefind-ui-tag: var(--surface);
      --pagefind-ui-border-radius: 6px;
      --pagefind-ui-font: var(--font-body);
    }

    .pagefind-ui__search-input {
      background: var(--surface2) !important;
      border: 1px solid var(--border2) !important;
      color: var(--text) !important;
      font-family: var(--font-mono) !important;
      border-radius: 6px !important;
    }
    .pagefind-ui__search-input:focus {
      border-color: var(--blue-bright) !important;
      outline: none !important;
    }
    .pagefind-ui__result {
      border-bottom: 1px solid var(--border) !important;
      padding: 20px 0 !important;
    }
    .pagefind-ui__result-link {
      color: var(--text-bright) !important;
      font-size: 16px !important;
      font-weight: 700 !important;
    }
    .pagefind-ui__result-link:hover {
      color: var(--blue-bright) !important;
    }
    .pagefind-ui__result-excerpt {
      color: var(--text-dim) !important;
      font-size: 13px !important;
      line-height: 1.65 !important;
      margin-top: 6px !important;
    }
    mark {
      background: rgba(59,130,246,0.2) !important;
      color: var(--blue-bright) !important;
      border-radius: 2px;
      padding: 0 2px;
    }
    .pagefind-ui__button {
      background: var(--surface2) !important;
      border: 1px solid var(--border2) !important;
      color: var(--text-dim) !important;
      border-radius: 6px !important;
    }
    .pagefind-ui__button:hover {
      border-color: var(--blue-bright) !important;
      color: var(--blue-bright) !important;
    }
    .pagefind-ui__search-clear {
      color: var(--text-dim) !important;
    }

    /* Light mode adjustments */
    [data-theme="light"] .pagefind-ui__search-input {
      background: #fff !important;
    }
  </style>
</head>
<body>
<!-- Header injected by site.js -->

<div class="search-wrap">
  <div class="search-heading">Search — Liminal Atlas</div>
  <div id="search"></div>
</div>

<script src="/_pagefind/pagefind-ui.js"></script>
<script src="/js/site.js"></script>
<script>
  // Init Pagefind after DOM ready
  window.addEventListener('DOMContentLoaded', function() {
    new PagefindUI({
      element: '#search',
      showSubResults: false,
      excerptLength: 30,
      resetStyles: false,
    });

    // Pre-fill query from URL param e.g. /search?q=townsend+brown
    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (q) {
      const input = document.querySelector('.pagefind-ui__search-input');
      if (input) {
        input.value = q;
        input.dispatchEvent(new Event('input', { bubbles: true }));
      }
    }
  });
</script>
</body>
</html>
